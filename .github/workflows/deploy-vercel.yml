name: Deploy Vercel (colaboradores)

# Vercel Hobby solo deploya commits cuyo autor es el dueño de la cuenta
# (faustinoUNC) — y desde 2026 aplica ese chequeo también a los Deploy
# Hooks, así que acá deployamos con el CLI reescribiendo el autor del
# commit SOLO en el checkout descartable de CI (el historial real del
# repo no se toca). Requiere el secret VERCEL_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Los pushes de faustinoUNC ya deployan solos por la integración Git;
    # sin este filtro habría deploys dobles. workflow_dispatch queda
    # habilitado para probar el circuito a mano.
    if: github.event_name == 'workflow_dispatch' || github.actor != 'faustinoUNC'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_nMRIs91NOuZdGLK7yPswNToh
      VERCEL_PROJECT_ID: prj_YDyyFEa7hbFLJ7SBDQZsjdNhsXTB
    steps:
      - uses: actions/checkout@v4

      - name: Reescribir autor del commit (chequeo de autor de Vercel Hobby)
        run: |
          git config user.name "Faustino Pieroni"
          git config user.email "faustino.pieroni@mi.unc.edu.ar"
          git commit --amend --no-edit --reset-author

      - name: Deploy a producción
        run: npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
